name: image-updates

# Weekly check for outdated third-party container images. Builds and runs
# tools/image-check, then upserts a single tracking Issue when anything is
# behind (and auto-closes it once everything is current).

on:
  schedule:
    # Sun 23:00 UTC == Mon 08:00 KST
    - cron: "0 23 * * 0"
  workflow_dispatch:

# Avoid scheduled + manual runs racing to create duplicate issues.
concurrency:
  group: image-updates
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_TITLE: "🔔 Outdated third-party container images"
      ISSUE_LABEL: image-updates
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/image-check

      - name: Build image-check
        run: cargo build --release --manifest-path tools/image-check/Cargo.toml

      - name: Run image-check
        id: run
        run: |
          set +e
          ./tools/image-check/target/release/image-check . --markdown > body.md
          code=$?
          set -e
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "image-check exit code: $code"
          cat body.md

      - name: Ensure label exists
        run: gh label create "$ISSUE_LABEL" --color FFA500 --description "Outdated third-party container images" --force

      - name: Upsert / close tracking issue
        run: |
          code="${{ steps.run.outputs.code }}"
          num=$(gh issue list --label "$ISSUE_LABEL" --state open --json number --jq '.[0].number // empty')

          case "$code" in
            10|20)
              # 10 = outdated images found · 20 = some registries errored
              if [ -n "$num" ]; then
                echo "Updating issue #$num"
                gh issue edit "$num" --body-file body.md
              else
                echo "Creating tracking issue"
                gh issue create --title "$ISSUE_TITLE" --label "$ISSUE_LABEL" --body-file body.md
              fi
              ;;
            0)
              if [ -n "$num" ]; then
                echo "All current — closing issue #$num"
                gh issue close "$num" --comment "All third-party images are up to date ✅ (auto-closed)"
              else
                echo "All third-party images are up to date ✅"
              fi
              ;;
            *)
              echo "::error::image-check failed with exit code $code"
              exit 1
              ;;
          esac
