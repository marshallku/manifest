name: image-updates

# Weekly check for outdated third-party container images via the reusable
# marshallku/image-check action, which upserts a single tracking Issue.

on:
  schedule:
    # Sun 23:00 UTC == Mon 08:00 KST
    - cron: "0 23 * * 0"
  workflow_dispatch:

# Avoid scheduled + manual runs racing to create duplicate issues.
concurrency:
  group: image-updates
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ISSUE_TITLE: "🔔 Outdated third-party container images"
      ISSUE_LABEL: image-updates
    steps:
      - uses: actions/checkout@v4

      - id: ic
        uses: marshallku/image-check@v1
        with:
          path: .

      - name: Ensure label exists
        run: gh label create "$ISSUE_LABEL" --color FFA500 --description "Outdated third-party container images" --force

      - name: Upsert / close tracking issue
        env:
          REPORT: ${{ steps.ic.outputs.report }}
          OUTDATED: ${{ steps.ic.outputs.outdated-count }}
          ERRORS: ${{ steps.ic.outputs.error-count }}
        run: |
          num=$(gh issue list --label "$ISSUE_LABEL" --state open --json number --jq '.[0].number // empty')
          # Surface both outdated images and registry errors; only auto-close
          # when everything is current AND nothing errored.
          if [ "$OUTDATED" != "0" ] || [ "$ERRORS" != "0" ]; then
            if [ -n "$num" ]; then
              echo "Updating issue #$num ($OUTDATED outdated, $ERRORS errors)"
              printf '%s' "$REPORT" | gh issue edit "$num" --body-file -
            else
              echo "Creating tracking issue ($OUTDATED outdated, $ERRORS errors)"
              printf '%s' "$REPORT" | gh issue create --title "$ISSUE_TITLE" --label "$ISSUE_LABEL" --body-file -
            fi
          elif [ -n "$num" ]; then
            echo "All current — closing issue #$num"
            gh issue close "$num" --comment "All third-party images are up to date ✅ (auto-closed)"
          else
            echo "All third-party images are up to date ✅"
          fi
