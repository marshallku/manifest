---
# Source: secrets-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical-secre-controller-manager
  namespace: infisical-operator
  labels:
    control-plane: controller-manager
    helm.sh/chart: secrets-operator-v0.10.33
    app.kubernetes.io/name: secrets-operator
    app.kubernetes.io/instance: infisical-secrets-operator
    app.kubernetes.io/version: "v0.10.33"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: secrets-operator
      app.kubernetes.io/instance: infisical-secrets-operator
  template:
    metadata:
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: secrets-operator
        app.kubernetes.io/instance: infisical-secrets-operator
      annotations:
        kubectl.kubernetes.io/default-container: manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --namespaces=maji-dev
        command:
        - /manager
        env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: "cluster.local"
        - name: INFISICAL_HOST_API
          value: "http://infisical.infisical.svc.cluster.local:8080/api"
        - name: INFISICAL_LOG_WRITER
          value: "stderr"
        image: infisical/kubernetes-operator:v0.10.33
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: infisical-secre-controller-manager
      terminationGracePeriodSeconds: 10
      nodeSelector: 
        kubernetes.io/hostname: mgmt01
      tolerations: 
        []
