apiVersion: apps/v1
kind: Deployment
metadata:
  name: maji-api
  namespace: maji
  labels:
    app: maji-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maji-api
  template:
    metadata:
      labels:
        app: maji-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        kubernetes.io/hostname: dev01
      containers:
        - name: api
          image: ghcr.io/80rian/maji-api:b7ea5fe9e73293438869acc60b7bea669872f1b7
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: maji-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: maji-secret
                  key: JWT_SECRET
            - name: BASE_URL
              value: https://api.maji.you
            - name: CORS_ORIGIN
              value: https://maji.you
            - name: KAKAO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: maji-secret
                  key: KAKAO_CLIENT_ID
            - name: KAKAO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: maji-secret
                  key: KAKAO_CLIENT_SECRET
            - name: KAKAO_REDIRECT_URI
              value: https://maji.you/oauth/callback
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: maji-secret
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: maji-secret
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_REDIRECT_URI
              value: https://maji.you/oauth/callback
            - name: S3_ENDPOINT
              value: https://12b800546f9b38de89d1585e397b611f.r2.cloudflarestorage.com
            - name: S3_REGION
              value: auto
            - name: S3_BUCKET
              value: maji-dev
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: maji-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: maji-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_PUBLIC_URL
              value: https://c1.maji.you
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
