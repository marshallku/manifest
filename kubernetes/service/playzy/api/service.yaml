apiVersion: v1
kind: Service
metadata:
  name: playzy-api
  namespace: playzy
  labels:
    app: playzy-api
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      # NodePort allocation (keep contiguous): maji 30500/30501, maji-dev
      # 30502/30503, irang 30504/30505/30508, misc 30506/30507/30509/30510.
      # playzy api picks up the next free slot. The cloudflared tunnel ingress
      # (api-playzy.marshallku.dev) targets this nodePort — set in the Cloudflare
      # Zero Trust dashboard, not in this repo.
      nodePort: 30511
  selector:
    app: playzy-api
