# Durable storage for the backend's SQLite quota ledger (PLAYZY_QUOTA_STORE=sqlite,
# PLAYZY_DB_PATH=/data/playzy.db). The reserve→commit credit ledger must survive
# pod restarts, so it lives on a node-local hostPath rather than an ephemeral
# emptyDir. Bound statically (storageClassName: "") the same way the monitoring
# stack's PVs are, and pinned to dev01 to match the api Deployment's nodeSelector
# — a hostPath volume is only meaningful on the one node that holds the files.
#
# NOTE: the hostPath below must exist (or be creatable) on dev01. Adjust the path
# if dev01's data disk is mounted elsewhere than /mnt/hdd/data.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: playzy-data-pv
  labels:
    app: playzy-api
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/hdd/data/dev01/playzy
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - dev01
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: playzy-data
  namespace: playzy
  labels:
    app: playzy-api
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 1Gi
  volumeName: playzy-data-pv
