apiVersion: apps/v1
kind: Deployment
metadata:
  name: irang-api
  namespace: irang-dev
  labels:
    app: irang-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: irang-api
  template:
    metadata:
      labels:
        app: irang-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        kubernetes.io/hostname: dev01
      # Native sidecar pattern (k8s 1.29+). kagi-serve is declared as an
      # initContainer with restartPolicy: Always so k8s starts it BEFORE
      # the api container and keeps it running. Without this, api boots
      # first, the /healthz probe fails (kagi not yet bound to 8921), and
      # the AI panel goes 503 for the lifetime of the pod.
      initContainers:
        - name: kagi-serve
          image: ghcr.io/marshallku/kagi:latest
          imagePullPolicy: Always
          restartPolicy: Always
          args:
            - "serve"
            - "-addr"
            - "0.0.0.0:8921"
          ports:
            - containerPort: 8921
          env:
            - name: KAGI_EMAIL
              valueFrom:
                secretKeyRef:
                  name: irang-secret
                  key: KAGI_EMAIL
            - name: KAGI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: irang-secret
                  key: KAGI_PASSWORD
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8921
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8921
            initialDelaySeconds: 15
            periodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/80rian/irang-api:16d84419f33d803a33dd84107c2b27a8dc166cb3
          ports:
            - containerPort: 8080
          env:
            # IRANG_PORT — Go server listens here. Matches Service targetPort.
            - name: IRANG_PORT
              value: "8080"
            # Shared with maji prd (single Postgres + schema separation per
            # ADR-0012). Connection string identical to maji-secret.DATABASE_URL.
            # First boot creates the `irang` schema via renameLegacyShopSchema +
            # CREATE SCHEMA IF NOT EXISTS and applies 0001..0004 migrations.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: irang-secret
                  key: DATABASE_URL
            # Signs irang admin session JWTs (typ=admin). Independent of any
            # future user-facing token once services/auth ships.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: irang-secret
                  key: JWT_SECRET
            - name: IRANG_BASE_URL
              value: https://api-dev.irang.me
            - name: IRANG_ADMIN_WEB_URL
              value: https://admin-dev.irang.me
            - name: IRANG_CORS_ORIGINS
              value: https://admin-dev.irang.me
            - name: IRANG_MIGRATIONS_DIR
              value: /migrations
            # Behind cloudflared (TLS terminated upstream). Session cookie is
            # Secure-only since the public origin is https.
            - name: IRANG_COOKIE_SECURE
              value: "true"
            # R2 — bucket exists from day 1 even though Phase 1 doesn't write
            # to it yet (image uploads land in a later track). Wiring is in
            # place so the first upload PR doesn't need to touch this manifest.
            - name: S3_ENDPOINT
              value: https://12b800546f9b38de89d1585e397b611f.r2.cloudflarestorage.com
            - name: S3_REGION
              value: auto
            - name: S3_BUCKET
              value: irang-dev
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: irang-secret
                  key: S3_ACCESS_KEY_ID
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: irang-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_PUBLIC_URL
              value: https://c1-dev.irang.me
            # Naver Shopping Search API — #25 admin 상품 리서치 도구. When
            # either is absent, /api/admin/research/naver is not mounted
            # (main.go gates the route + handler returns 503 as defense-in-
            # depth). Phase 1 manual aggregator path; Phase 2 will add the
            # background scheduler + raw_listings cache.
            - name: NAVER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: irang-secret
                  key: NAVER_CLIENT_ID
            - name: NAVER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: irang-secret
                  key: NAVER_CLIENT_SECRET
            # AI authoring (#24) — kagi-serve sidecar in the same pod hosts
            # the /chat HTTP surface on localhost:8921. irang-api boots,
            # probes kagi /healthz, and syncs docs/prompts/*.md to kagi's
            # /assistants (POST or PATCH per drift). Auth secrets are on
            # the kagi-serve container, not here.
            - name: AI_PROVIDER
              value: kagi
            - name: KAGI_BASE_URL
              value: http://127.0.0.1:8921
            - name: KAGI_MODEL
              value: claude-4-sonnet
            - name: PROMPTS_DIR
              value: /docs/prompts
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
