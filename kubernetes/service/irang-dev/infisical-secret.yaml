apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: irang-secret
  namespace: irang-dev
spec:
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: irang-dev
        envSlug: dev
        secretsPath: "/"
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: irang-dev
  managedSecretReference:
    secretName: irang-secret
    secretNamespace: irang-dev
    creationPolicy: Owner
