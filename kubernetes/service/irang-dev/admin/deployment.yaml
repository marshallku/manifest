apiVersion: apps/v1
kind: Deployment
metadata:
  name: irang-admin-web
  namespace: irang-dev
  labels:
    app: irang-admin-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: irang-admin-web
  template:
    metadata:
      labels:
        app: irang-admin-web
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        kubernetes.io/hostname: dev01
      containers:
        - name: admin-web
          image: ghcr.io/80rian/irang-admin-web:9e9cd0845bbaf86cbb4342455761057c6d72fdd0
          ports:
            - containerPort: 3000
          env:
            # Next.js standalone server listens on 3000 by default in prod
            # (next start --port 5006 is the local dev script; the prod
            # Dockerfile drops back to 3000 — matches the Service targetPort).
            - name: PORT
              value: "3000"
            # In-cluster API URL — Next.js rewrites under /api/:path*
            # (apps/admin/web/next.config.ts) forward to this address.
            - name: IRANG_API_URL
              value: http://irang-api.irang-dev.svc.cluster.local:8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
