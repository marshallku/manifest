apiVersion: v1
kind: Service
metadata:
  name: personality-web
  namespace: irang-dev
  labels:
    app: personality-web
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      # irang-dev uses 30506 (api), 30507 (admin), 30509 (web); 30510 is free.
      nodePort: 30510
  selector:
    app: personality-web
