apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: maji-secret
  namespace: maji-dev
spec:
  resyncInterval: 60
  authentication:
    universalAuth:
      secretsScope:
        projectSlug: maji-dev
        envSlug: dev
        secretsPath: "/"
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: maji-dev
  managedSecretReference:
    secretName: maji-secret
    secretNamespace: maji-dev
    creationPolicy: Owner
