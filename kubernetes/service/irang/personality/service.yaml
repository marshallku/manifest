apiVersion: v1
kind: Service
metadata:
  name: personality-web
  namespace: irang
  labels:
    app: personality-web
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      # irang uses 30504 (api), 30505 (admin), 30508 (web); 30509 is free.
      nodePort: 30509
  selector:
    app: personality-web
