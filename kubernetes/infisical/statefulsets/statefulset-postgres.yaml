apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: infisical-postgres
  namespace: infisical
  labels:
    app.kubernetes.io/name: infisical-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: infisical
spec:
  serviceName: infisical-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infisical-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infisical-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: infisical
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/hostname: mgmt01
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-chown
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              mkdir -p /var/lib/postgresql/data/pgdata
              chown -R 999:999 /var/lib/postgresql/data
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: infisical
            - name: POSTGRES_USER
              value: infisical
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infisical-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "infisical", "-d", "infisical"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "infisical", "-d", "infisical"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: infisical-postgres-data
