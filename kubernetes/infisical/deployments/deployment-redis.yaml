apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical-redis
  namespace: infisical
  labels:
    app.kubernetes.io/name: infisical-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: infisical
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: infisical-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infisical-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: infisical
    spec:
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/hostname: mgmt01
      securityContext:
        fsGroup: 999
      initContainers:
        - name: init-chown
          image: busybox:1.37
          command: ["sh", "-c", "chown -R 999:999 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - --save
            - "60"
            - "1"
            - --appendonly
            - "yes"
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: infisical-redis-data
