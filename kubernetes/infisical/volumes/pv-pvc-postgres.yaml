apiVersion: v1
kind: PersistentVolume
metadata:
  name: infisical-postgres-pv
  labels:
    app.kubernetes.io/name: infisical-postgres
    app.kubernetes.io/part-of: infisical
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/hdd/data/mgmt01/infisical/postgres
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - mgmt01
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infisical-postgres-data
  namespace: infisical
  labels:
    app.kubernetes.io/name: infisical-postgres
    app.kubernetes.io/part-of: infisical
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 10Gi
  volumeName: infisical-postgres-pv
