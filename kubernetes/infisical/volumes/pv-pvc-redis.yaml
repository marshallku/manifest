apiVersion: v1
kind: PersistentVolume
metadata:
  name: infisical-redis-pv
  labels:
    app.kubernetes.io/name: infisical-redis
    app.kubernetes.io/part-of: infisical
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/hdd/data/mgmt01/infisical/redis
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - mgmt01
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: infisical-redis-data
  namespace: infisical
  labels:
    app.kubernetes.io/name: infisical-redis
    app.kubernetes.io/part-of: infisical
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  resources:
    requests:
      storage: 1Gi
  volumeName: infisical-redis-pv
