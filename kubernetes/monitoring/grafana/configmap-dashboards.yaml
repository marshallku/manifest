apiVersion: v1
kind: ConfigMap
metadata:
    name: grafana-dashboard-provider
    namespace: mgmt01
    labels:
        app: grafana
data:
    dashboards.yaml: |
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            updateIntervalSeconds: 30
            options:
              path: /var/lib/grafana/dashboards
              foldersFromFilesStructure: false
