apiVersion: v1
kind: ConfigMap
metadata:
    name: grafana-datasources
    namespace: mgmt01
    labels:
        app: grafana
data:
    datasources.yaml: |
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://prometheus:9090
            isDefault: true
            editable: false

          - name: Loki
            type: loki
            access: proxy
            url: http://loki:3100
            editable: false

          - name: InfluxDB
            uid: influxdb-home
            type: influxdb
            access: proxy
            url: http://192.168.219.130:8086
            jsonData:
              version: Flux
              organization: marshall
              defaultBucket: home
              tlsSkipVerify: true
            secureJsonData:
              token: $INFLUXDB_TOKEN
            editable: false
