apiVersion: v1
kind: ConfigMap
metadata:
    name: grafana-dashboard-containers
    namespace: mgmt01
    labels:
        app: grafana
data:
    container-monitoring.json: |
        {
            "__inputs": [],
            "__requires": [],
            "annotations": { "list": [] },
            "editable": true,
            "fiscalYearStartMonth": 0,
            "graphTooltip": 1,
            "id": null,
            "links": [],
            "panels": [
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "palette-classic" },
                            "custom": {
                                "axisBorderShow": false,
                                "drawStyle": "line",
                                "fillOpacity": 20,
                                "lineWidth": 1,
                                "pointSize": 5,
                                "showPoints": "never",
                                "spanNulls": false,
                                "stacking": { "mode": "none" }
                            },
                            "unit": "percentunit"
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
                    "id": 1,
                    "title": "CPU Usage per Container",
                    "type": "timeseries",
                    "targets": [
                        {
                            "expr": "sum(rate(container_cpu_usage_seconds_total{name=~\"$container\", instance=~\"$node\"}[$__rate_interval])) by (name)",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "palette-classic" },
                            "custom": {
                                "axisBorderShow": false,
                                "drawStyle": "line",
                                "fillOpacity": 20,
                                "lineWidth": 1,
                                "pointSize": 5,
                                "showPoints": "never",
                                "spanNulls": false,
                                "stacking": { "mode": "none" }
                            },
                            "unit": "bytes"
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
                    "id": 2,
                    "title": "Memory Usage per Container",
                    "type": "timeseries",
                    "targets": [
                        {
                            "expr": "container_memory_working_set_bytes{name=~\"$container\", instance=~\"$node\"}",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "palette-classic" },
                            "custom": {
                                "axisBorderShow": false,
                                "drawStyle": "line",
                                "fillOpacity": 20,
                                "lineWidth": 1,
                                "pointSize": 5,
                                "showPoints": "never",
                                "spanNulls": false,
                                "stacking": { "mode": "none" }
                            },
                            "unit": "Bps"
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
                    "id": 3,
                    "title": "Network Receive per Container",
                    "type": "timeseries",
                    "targets": [
                        {
                            "expr": "sum(rate(container_network_receive_bytes_total{name=~\"$container\", instance=~\"$node\"}[$__rate_interval])) by (name)",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "palette-classic" },
                            "custom": {
                                "axisBorderShow": false,
                                "drawStyle": "line",
                                "fillOpacity": 20,
                                "lineWidth": 1,
                                "pointSize": 5,
                                "showPoints": "never",
                                "spanNulls": false,
                                "stacking": { "mode": "none" }
                            },
                            "unit": "Bps"
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
                    "id": 4,
                    "title": "Network Transmit per Container",
                    "type": "timeseries",
                    "targets": [
                        {
                            "expr": "sum(rate(container_network_transmit_bytes_total{name=~\"$container\", instance=~\"$node\"}[$__rate_interval])) by (name)",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "palette-classic" },
                            "custom": {
                                "axisBorderShow": false,
                                "drawStyle": "line",
                                "fillOpacity": 20,
                                "lineWidth": 1,
                                "pointSize": 5,
                                "showPoints": "never",
                                "spanNulls": false,
                                "stacking": { "mode": "none" }
                            },
                            "unit": "Bps"
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
                    "id": 5,
                    "title": "Disk Read per Container",
                    "type": "timeseries",
                    "targets": [
                        {
                            "expr": "sum(rate(container_fs_reads_bytes_total{name=~\"$container\", instance=~\"$node\"}[$__rate_interval])) by (name)",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "palette-classic" },
                            "custom": {
                                "axisBorderShow": false,
                                "drawStyle": "line",
                                "fillOpacity": 20,
                                "lineWidth": 1,
                                "pointSize": 5,
                                "showPoints": "never",
                                "spanNulls": false,
                                "stacking": { "mode": "none" }
                            },
                            "unit": "Bps"
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
                    "id": 6,
                    "title": "Disk Write per Container",
                    "type": "timeseries",
                    "targets": [
                        {
                            "expr": "sum(rate(container_fs_writes_bytes_total{name=~\"$container\", instance=~\"$node\"}[$__rate_interval])) by (name)",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "palette-classic" },
                            "custom": {
                                "axisBorderShow": false,
                                "drawStyle": "line",
                                "fillOpacity": 20,
                                "lineWidth": 1,
                                "pointSize": 5,
                                "showPoints": "never",
                                "spanNulls": false,
                                "stacking": { "mode": "none" }
                            },
                            "unit": "bytes"
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
                    "id": 7,
                    "title": "Memory RSS per Container",
                    "type": "timeseries",
                    "targets": [
                        {
                            "expr": "container_memory_rss{name=~\"$container\", instance=~\"$node\"}",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "palette-classic" },
                            "custom": {
                                "axisBorderShow": false,
                                "drawStyle": "line",
                                "fillOpacity": 20,
                                "lineWidth": 1,
                                "pointSize": 5,
                                "showPoints": "never",
                                "spanNulls": false,
                                "stacking": { "mode": "none" }
                            },
                            "unit": "bytes"
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
                    "id": 8,
                    "title": "Memory Cache per Container",
                    "type": "timeseries",
                    "targets": [
                        {
                            "expr": "container_memory_cache{name=~\"$container\", instance=~\"$node\"}",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "thresholds" },
                            "thresholds": {
                                "steps": [
                                    { "color": "green", "value": null },
                                    { "color": "yellow", "value": 50 },
                                    { "color": "red", "value": 80 }
                                ]
                            },
                            "unit": "percent",
                            "min": 0,
                            "max": 100
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 24, "x": 0, "y": 32 },
                    "id": 9,
                    "title": "Memory Usage % (of limit)",
                    "type": "bargauge",
                    "options": {
                        "displayMode": "gradient",
                        "orientation": "horizontal",
                        "reduceOptions": { "calcs": ["lastNotNull"] }
                    },
                    "targets": [
                        {
                            "expr": "(container_memory_working_set_bytes{name=~\"$container\", instance=~\"$node\"} / container_spec_memory_limit_bytes{name=~\"$container\", instance=~\"$node\"}) * 100 > 0",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "color": { "mode": "thresholds" },
                            "thresholds": {
                                "steps": [
                                    { "color": "green", "value": null },
                                    { "color": "yellow", "value": 50 },
                                    { "color": "red", "value": 80 }
                                ]
                            },
                            "unit": "percentunit",
                            "min": 0,
                            "max": 1
                        },
                        "overrides": []
                    },
                    "gridPos": { "h": 8, "w": 24, "x": 0, "y": 40 },
                    "id": 10,
                    "title": "CPU Usage Overview",
                    "type": "bargauge",
                    "options": {
                        "displayMode": "gradient",
                        "orientation": "horizontal",
                        "reduceOptions": { "calcs": ["lastNotNull"] }
                    },
                    "targets": [
                        {
                            "expr": "sum(rate(container_cpu_usage_seconds_total{name=~\"$container\", instance=~\"$node\"}[$__rate_interval])) by (name)",
                            "legendFormat": "{{name}}"
                        }
                    ]
                },
                {
                    "datasource": { "type": "prometheus", "uid": "" },
                    "fieldConfig": {
                        "defaults": {
                            "custom": {
                                "align": "auto"
                            },
                            "unit": "none"
                        },
                        "overrides": [
                            {
                                "matcher": { "id": "byName", "options": "CPU" },
                                "properties": [
                                    { "id": "unit", "value": "percentunit" },
                                    { "id": "custom.width", "value": 100 }
                                ]
                            },
                            {
                                "matcher": { "id": "byName", "options": "Memory" },
                                "properties": [
                                    { "id": "unit", "value": "bytes" },
                                    { "id": "custom.width", "value": 120 }
                                ]
                            },
                            {
                                "matcher": { "id": "byName", "options": "Net RX" },
                                "properties": [
                                    { "id": "unit", "value": "Bps" },
                                    { "id": "custom.width", "value": 100 }
                                ]
                            },
                            {
                                "matcher": { "id": "byName", "options": "Net TX" },
                                "properties": [
                                    { "id": "unit", "value": "Bps" },
                                    { "id": "custom.width", "value": 100 }
                                ]
                            }
                        ]
                    },
                    "gridPos": { "h": 10, "w": 24, "x": 0, "y": 48 },
                    "id": 11,
                    "title": "Container Overview Table",
                    "type": "table",
                    "options": {
                        "sortBy": [{ "displayName": "Memory", "desc": true }]
                    },
                    "targets": [
                        {
                            "expr": "sum(rate(container_cpu_usage_seconds_total{name=~\"$container\", instance=~\"$node\"}[$__rate_interval])) by (name)",
                            "legendFormat": "{{name}}",
                            "instant": true,
                            "refId": "CPU"
                        },
                        {
                            "expr": "container_memory_working_set_bytes{name=~\"$container\", instance=~\"$node\"}",
                            "legendFormat": "{{name}}",
                            "instant": true,
                            "refId": "Memory"
                        },
                        {
                            "expr": "sum(rate(container_network_receive_bytes_total{name=~\"$container\", instance=~\"$node\"}[$__rate_interval])) by (name)",
                            "legendFormat": "{{name}}",
                            "instant": true,
                            "refId": "Net RX"
                        },
                        {
                            "expr": "sum(rate(container_network_transmit_bytes_total{name=~\"$container\", instance=~\"$node\"}[$__rate_interval])) by (name)",
                            "legendFormat": "{{name}}",
                            "instant": true,
                            "refId": "Net TX"
                        }
                    ],
                    "transformations": [
                        {
                            "id": "seriesToColumns",
                            "options": { "byField": "name" }
                        },
                        {
                            "id": "organize",
                            "options": {
                                "renameByName": {
                                    "name": "Container",
                                    "Value #CPU": "CPU",
                                    "Value #Memory": "Memory",
                                    "Value #Net RX": "Net RX",
                                    "Value #Net TX": "Net TX"
                                }
                            }
                        }
                    ]
                }
            ],
            "schemaVersion": 39,
            "tags": ["docker", "containers"],
            "templating": {
                "list": [
                    {
                        "current": {
                            "selected": false,
                            "text": "All",
                            "value": "$__all"
                        },
                        "definition": "label_values(container_last_seen{name!=\"\"}, instance)",
                        "hide": 0,
                        "includeAll": true,
                        "label": "Node",
                        "multi": true,
                        "name": "node",
                        "query": {
                            "qryType": 1,
                            "query": "label_values(container_last_seen{name!=\"\"}, instance)"
                        },
                        "refresh": 2,
                        "type": "query"
                    },
                    {
                        "current": {
                            "selected": false,
                            "text": "All",
                            "value": "$__all"
                        },
                        "definition": "label_values(container_last_seen{name!=\"\", instance=~\"$node\"}, name)",
                        "hide": 0,
                        "includeAll": true,
                        "label": "Container",
                        "multi": true,
                        "name": "container",
                        "query": {
                            "qryType": 1,
                            "query": "label_values(container_last_seen{name!=\"\", instance=~\"$node\"}, name)"
                        },
                        "refresh": 2,
                        "type": "query"
                    }
                ]
            },
            "time": { "from": "now-1h", "to": "now" },
            "title": "Container Monitoring",
            "uid": "container-monitoring",
            "version": 1
        }
