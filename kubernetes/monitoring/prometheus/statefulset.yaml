apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: prometheus
    namespace: mgmt01
    labels:
        app: prometheus
spec:
    serviceName: prometheus
    replicas: 1
    selector:
        matchLabels:
            app: prometheus
    template:
        metadata:
            labels:
                app: prometheus
        spec:
            nodeSelector:
                kubernetes.io/hostname: mgmt01
            serviceAccountName: prometheus
            initContainers:
                - name: init-chown
                  image: busybox:1.37
                  command: ["sh", "-c", "chown -R 65534:65534 /prometheus"]
                  volumeMounts:
                      - name: data
                        mountPath: /prometheus
            containers:
                - name: prometheus
                  image: prom/prometheus:v3.9.1
                  args:
                      - --config.file=/etc/prometheus/prometheus.yml
                      - --storage.tsdb.path=/prometheus
                      - --storage.tsdb.retention.time=90d
                      - --storage.tsdb.retention.size=18GB
                      - --web.enable-lifecycle
                  ports:
                      - name: http
                        containerPort: 9090
                  readinessProbe:
                      httpGet:
                          path: /-/ready
                          port: 9090
                      initialDelaySeconds: 10
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /-/healthy
                          port: 9090
                      initialDelaySeconds: 15
                      periodSeconds: 15
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          memory: 1Gi
                  volumeMounts:
                      - name: config
                        mountPath: /etc/prometheus
                      - name: data
                        mountPath: /prometheus
            volumes:
                - name: config
                  configMap:
                      name: prometheus-config
                - name: data
                  persistentVolumeClaim:
                      claimName: prometheus-data
---
apiVersion: v1
kind: ServiceAccount
metadata:
    name: prometheus
    namespace: mgmt01
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    name: prometheus
rules:
    - apiGroups: [""]
      resources:
          - nodes
          - nodes/proxy
          - services
          - endpoints
          - pods
      verbs: ["get", "list", "watch"]
    - nonResourceURLs: ["/metrics"]
      verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
    name: prometheus
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: ClusterRole
    name: prometheus
subjects:
    - kind: ServiceAccount
      name: prometheus
      namespace: mgmt01
