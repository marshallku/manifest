apiVersion: v1
kind: PersistentVolume
metadata:
    name: loki-pv
    labels:
        app: loki
spec:
    capacity:
        storage: 10Gi
    accessModes:
        - ReadWriteOnce
    persistentVolumeReclaimPolicy: Retain
    storageClassName: ""
    hostPath:
        path: /mnt/hdd/data/mgmt01/loki
        type: DirectoryOrCreate
    nodeAffinity:
        required:
            nodeSelectorTerms:
                - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                            - mgmt01
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: loki-data
    namespace: mgmt01
    labels:
        app: loki
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: ""
    resources:
        requests:
            storage: 10Gi
    volumeName: loki-pv
